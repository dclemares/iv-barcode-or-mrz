<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Barcode or MRZ?</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0b0f14; color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }
  #stage { position: relative; flex: 1; overflow: hidden; background: #000; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain;
    background: #000; display: none; }

  /* Framing guide */
  #guide { position: absolute; left: 8%; right: 8%; top: 28%; bottom: 28%;
    border: 2px dashed rgba(255,255,255,.35); border-radius: 14px; pointer-events: none; }

  /* Result banner */
  #overlay { position: absolute; left: 0; right: 0; top: 0; padding: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
  #banner { min-width: 60%; max-width: 92%; text-align: center; padding: 18px 22px;
    border-radius: 16px; font-size: clamp(22px, 6vw, 40px); font-weight: 800; letter-spacing: .5px;
    box-shadow: 0 8px 30px rgba(0,0,0,.45); transition: background .15s ease; }
  #detail { font-size: clamp(12px, 3.5vw, 16px); opacity: .9; text-align: center;
    background: rgba(0,0,0,.45); padding: 4px 12px; border-radius: 10px; min-height: 1em; }

  .scanning { background: #374151; }
  .notfound { background: #4b5563; }
  .mrz      { background: #2563eb; }
  .usa      { background: #16a34a; }
  .canada   { background: #d52b1e; }
  .mexico   { background: #0d9488; }
  .aamva    { background: #475569; }  /* AAMVA, unrecognized jurisdiction */
  .colombia { background: #f59e0b; color: #1f2937; }
  .error    { background: #7f1d1d; }

  /* Controls */
  #controls { display: flex; gap: 10px; align-items: center; padding: 10px 12px;
    background: #0b0f14; border-top: 1px solid #1f2933; }
  #cameraSelect { flex: 1; min-width: 0; padding: 10px; border-radius: 10px;
    background: #1f2933; color: #e5e7eb; border: 1px solid #2d3a47; font-size: 14px; }
  button { padding: 10px 14px; border-radius: 10px; border: 0; background: #2563eb;
    color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; }
  button:active { transform: translateY(1px); }
  .btnlike { display: inline-flex; align-items: center; justify-content: center;
    padding: 14px 24px; border-radius: 10px; background: #1f2933; color: #e5e7eb;
    border: 1px solid #2d3a47; font-weight: 600; font-size: 16px; cursor: pointer; }
  .iconbtn { display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 14px; border-radius: 10px; background: #1f2933; color: #e5e7eb;
    border: 1px solid #2d3a47; font-size: 16px; cursor: pointer; }
  #status { padding: 8px 12px; font-size: 13px; color: #9ca3af; background: #0b0f14;
    border-top: 1px solid #1f2933; text-align: center; min-height: 1.2em; }

  /* Start screen */
  #start { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; background: #0b0f14; z-index: 5; }
  #start h1 { font-size: clamp(20px, 5vw, 28px); margin: 0; }
  #start p { max-width: 420px; text-align: center; color: #9ca3af; margin: 0 16px; line-height: 1.5; }
  #startBtn { font-size: 18px; padding: 14px 24px; }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="video" playsinline muted autoplay></video>
    <img id="photo" alt="">
    <div id="guide"></div>
    <div id="overlay">
      <div id="banner" class="scanning">Point at the document…</div>
      <div id="detail"></div>
    </div>
    <div id="start">
      <h1>Barcode or MRZ?</h1>
      <p>Identifies in real time whether what you show the camera is an <b>MRZ</b>,
         a <b>US/Canada driver-license barcode</b>, or a <b>Colombian ID-card barcode</b>.</p>
      <button id="startBtn">▶ Start camera</button>
      <label class="btnlike" for="fileInput">📁 Upload image</label>
    </div>
  </div>
  <div id="controls">
    <select id="cameraSelect" title="Camera"></select>
    <label class="iconbtn" for="fileInput" title="Upload image">📁</label>
    <button id="restartBtn" title="Back to camera">↻</button>
    <input id="fileInput" type="file" accept="image/*" hidden>
  </div>
  <div id="status">Tap “Start camera”.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<script>
"use strict";

const video        = document.getElementById('video');
const banner       = document.getElementById('banner');
const detail       = document.getElementById('detail');
const statusEl     = document.getElementById('status');
const cameraSelect = document.getElementById('cameraSelect');
const startScreen  = document.getElementById('start');
const startBtn     = document.getElementById('startBtn');
const restartBtn   = document.getElementById('restartBtn');
const fileInput    = document.getElementById('fileInput');
const photo        = document.getElementById('photo');

let codeReader  = null;   // ZXing
let ocrWorker   = null;   // Tesseract
let ocrBusy     = false;
let lastResultAt  = 0;
let lastBarcodeAt = -99999;
let mode = 'live';        // 'live' (camera) | 'image' (uploaded image)
let ocrInitPromise = null;
const STICKY_MS = 1500;   // how long a result stays before reverting to "scanning"

/* ───────────────────── Classification ───────────────────── */

// AAMVA (US and Canada licenses): the PDF417 starts with '@' and contains "ANSI " + IIN.
// The Colombian ID card uses a proprietary binary PDF417 (Registraduría) without that header.
function isAAMVA(text) {
  return text.indexOf('ANSI ') !== -1 || text.charCodeAt(0) === 64; // 64 = '@'
}

// IIN (Issuer Identification Number) → [country, jurisdiction]. The 6 digits after "ANSI ".
// Lets us tell USA apart from Canada. Source: AAMVA registry (c0shea/IdParser, py-aamva).
const AAMVA_ISSUERS = {
  // Canada
  '604432':['CA','Alberta'], '990876':['CA','Alberta'],
  '636028':['CA','British Columbia'], '636048':['CA','Manitoba'],
  '636017':['CA','New Brunswick'], '636016':['CA','Newfoundland and Labrador'],
  '636013':['CA','Nova Scotia'], '604433':['CA','Nunavut'], '636012':['CA','Ontario'],
  '604426':['CA','Prince Edward Island'], '604428':['CA','Quebec'],
  '636044':['CA','Saskatchewan'], '604429':['CA','Yukon'],
  // Mexico
  '636056':['MX','Coahuila'], '636057':['MX','Hidalgo'],
  // USA (states and territories)
  '636033':['US','Alabama'], '636059':['US','Alaska'], '636026':['US','Arizona'],
  '636021':['US','Arkansas'], '636014':['US','California'], '636020':['US','Colorado'],
  '636006':['US','Connecticut'], '636011':['US','Delaware'], '636043':['US','District of Columbia'],
  '636010':['US','Florida'], '636055':['US','Georgia'], '636019':['US','Guam'],
  '636047':['US','Hawaii'], '636050':['US','Idaho'], '636035':['US','Illinois'],
  '636037':['US','Indiana'], '636018':['US','Iowa'], '636022':['US','Kansas'],
  '636046':['US','Kentucky'], '636007':['US','Louisiana'], '636041':['US','Maine'],
  '636003':['US','Maryland'], '636002':['US','Massachusetts'], '636032':['US','Michigan'],
  '636038':['US','Minnesota'], '636051':['US','Mississippi'], '636030':['US','Missouri'],
  '636008':['US','Montana'], '636054':['US','Nebraska'], '636049':['US','Nevada'],
  '636039':['US','New Hampshire'], '636036':['US','New Jersey'], '636009':['US','New Mexico'],
  '636001':['US','New York'], '636004':['US','North Carolina'], '636034':['US','North Dakota'],
  '636023':['US','Ohio'], '636058':['US','Oklahoma'], '636029':['US','Oregon'],
  '636025':['US','Pennsylvania'], '604431':['US','Puerto Rico'], '636052':['US','Rhode Island'],
  '636005':['US','South Carolina'], '636042':['US','South Dakota'], '636053':['US','Tennessee'],
  '636015':['US','Texas'], '636040':['US','Utah'], '636024':['US','Vermont'],
  '636000':['US','Virginia'], '636045':['US','Washington'], '636061':['US','West Virginia'],
  '636031':['US','Wisconsin'], '636060':['US','Wyoming'],
  '636027':['US','U.S. State Department'], '636062':['US','U.S. Virgin Islands'],
  '604427':['US','American Samoa'], '604430':['US','Northern Mariana Islands']
};

function handleBarcode(text) {
  lastBarcodeAt = performance.now();
  if (!isAAMVA(text)) {
    // A PDF417 that is NOT AAMVA → Colombian ID card (Registraduría proprietary format).
    setResult('colombia', 'BARCODE · Colombia', 'ID card (proprietary PDF417, non-AAMVA)');
    return;
  }
  const i = text.indexOf('ANSI ');
  const iin = i !== -1 ? text.substr(i + 5, 6) : '';
  const issuer = AAMVA_ISSUERS[iin];
  if (issuer && issuer[0] === 'CA') {
    setResult('canada', 'BARCODE · Canada', issuer[1] + ' · AAMVA license · IIN ' + iin);
  } else if (issuer && issuer[0] === 'US') {
    setResult('usa', 'BARCODE · USA', issuer[1] + ' · AAMVA license · IIN ' + iin);
  } else if (issuer && issuer[0] === 'MX') {
    setResult('mexico', 'BARCODE · Mexico', issuer[1] + ' · AAMVA license · IIN ' + iin);
  } else {
    // Valid AAMVA but an unregistered IIN (e.g. Northwest Territories): we don't guess the country.
    setResult('aamva', 'BARCODE · USA/Canada',
              'AAMVA license · IIN ' + iin + ' (unrecognized jurisdiction)');
  }
}

// Recognizes the "shape" of an MRZ without needing to read it perfectly:
// 2-3 long, monospaced lines, almost only [A-Z0-9<], with '<<' filler.
function looksLikeMRZ(text) {
  // Keep only MRZ characters per line (drop spaces / stray OCR punctuation), then look for ≥2 lines
  // of MRZ length (TD1=30, TD2=36, TD3=44) with filler '<' runs — which plain text doesn't have.
  const lines = text.split('\n')
    .map(l => l.toUpperCase().replace(/[^A-Z0-9<]/g, ''))
    .filter(l => l.length >= 20);
  let mrzLines = 0, hasRun = false;
  for (const line of lines) {
    if (line.length < 26 || line.length > 46) continue;
    const fillers = (line.match(/</g) || []).length;
    const alnum = (line.match(/[A-Z0-9]/g) || []).length;
    if (fillers >= 1 && alnum >= 5) mrzLines++;
    if (/<{2,}/.test(line)) hasRun = true;
  }
  return mrzLines >= 2 && hasRun;
}

/* ───────────────────── UI ───────────────────── */

function setResult(cls, text, sub) {
  lastResultAt = performance.now();
  banner.className = cls;
  banner.textContent = text;
  detail.textContent = sub || '';
}

function showFatal(msg) {
  banner.className = 'error';
  banner.textContent = 'Error';
  detail.textContent = '';
  statusEl.textContent = msg;
}

// Revert to "scanning" after a while with no new detections.
setInterval(() => {
  if (mode === 'live' && performance.now() - lastResultAt > STICKY_MS && banner.className !== 'error') {
    banner.className = 'scanning';
    banner.textContent = 'Point at the document…';
    detail.textContent = '';
  }
}, 300);

/* ───────────────────── Barcode (ZXing / PDF417) ───────────────────── */

const hints = new Map();
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.PDF_417]);
hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

// Native BarcodeDetector (when available + supports PDF417). On Chrome/macOS & Android it's
// backed by the OS and decodes dense/low-quality PDF417 far better than ZXing-js.
let nativeDetector = null;
(async () => {
  try {
    if ('BarcodeDetector' in window) {
      const formats = await window.BarcodeDetector.getSupportedFormats();
      if (formats.includes('pdf417')) nativeDetector = new window.BarcodeDetector({ formats: ['pdf417'] });
    }
  } catch (e) { nativeDetector = null; }
})();

async function startScanner(deviceId) {
  if (codeReader) { try { codeReader.reset(); } catch (e) {} }
  codeReader = new ZXing.BrowserMultiFormatReader(hints, 150);
  await codeReader.decodeFromVideoDevice(deviceId || undefined, video, (result) => {
    if (result) handleBarcode(result.getText());
  });
}

// Live: also poll the native detector — it catches PDF417 that ZXing's continuous scan misses.
async function nativeTick() {
  if (mode !== 'live' || !nativeDetector || !video.videoWidth) return;
  if (performance.now() - lastBarcodeAt < 1200) return;
  try {
    const codes = await nativeDetector.detect(video);
    if (codes && codes.length) handleBarcode(codes[0].rawValue);
  } catch (e) { /* ignore */ }
}
setInterval(nativeTick, 400);

// Build a preprocessed canvas (grayscale + contrast or binarization), optionally upscaled,
// to give ZXing a better shot at a low-contrast / dense scan.
function preprocess(source, sw, sh, targetW, variant) {
  const w = Math.min(targetW, Math.round(sw * 1.5));
  const scale = w / sw;
  const h = Math.round(sh * scale);
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(source, 0, 0, sw, sh, 0, 0, w, h);
  const id = ctx.getImageData(0, 0, w, h);
  const d = id.data;
  let sum = 0;
  for (let i = 0; i < d.length; i += 4) {
    const g = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
    d[i] = d[i + 1] = d[i + 2] = g; sum += g;
  }
  const mean = sum / (w * h);
  for (let i = 0; i < d.length; i += 4) {
    let v;
    if (variant === 'binary') v = d[i] < mean ? 0 : 255;
    else { v = (d[i] - mean) * 1.6 + mean; v = v < 0 ? 0 : v > 255 ? 255 : v; }
    d[i] = d[i + 1] = d[i + 2] = v;
  }
  ctx.putImageData(id, 0, 0);
  return c;
}

// Decode a PDF417 from an image: native first, then ZXing, then ZXing on preprocessed variants.
// Returns the decoded string, or null if nothing could be decoded.
async function decodeBarcode(source, sw, sh) {
  if (nativeDetector) {
    try {
      const codes = await nativeDetector.detect(source);
      if (codes && codes.length) return codes[0].rawValue;
    } catch (e) {}
  }
  const reader = new ZXing.BrowserMultiFormatReader(hints);
  try {
    const r = await reader.decodeFromImageElement(source);
    if (r) return r.getText();
  } catch (e) {}
  for (const variant of ['contrast', 'binary']) {
    for (const w of [Math.min(1600, sw), 1000]) {
      try {
        const canvas = preprocess(source, sw, sh, w, variant);
        const r = await reader.decodeFromImageUrl(canvas.toDataURL());
        if (r) return r.getText();
      } catch (e) {}
    }
  }
  return null;
}

// Heuristic "is a barcode visibly present?" — last resort when nothing decoded and there's no MRZ.
// Looks for a contiguous band of rows with very high black/white transition density (the signature
// of a 1D/PDF417 barcode), which plain printed text doesn't reach.
function detectBarcodeBand(source, sw, sh) {
  const W = Math.min(900, sw);
  const scale = W / sw;
  const H = Math.round(sh * scale);
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(source, 0, 0, sw, sh, 0, 0, W, H);
  const d = ctx.getImageData(0, 0, W, H).data;
  const gray = new Uint8Array(W * H);
  let sum = 0;
  for (let p = 0, q = 0; p < d.length; p += 4, q++) {
    const g = (d[p] * 0.299 + d[p + 1] * 0.587 + d[p + 2] * 0.114) | 0;
    gray[q] = g; sum += g;
  }
  const thresh = sum / (W * H);
  const minTransitions = W * 0.18;
  let run = 0, maxRun = 0;
  for (let y = 0; y < H; y++) {
    let tr = 0, prev = gray[y * W] < thresh ? 0 : 1;
    for (let x = 1; x < W; x++) {
      const cur = gray[y * W + x] < thresh ? 0 : 1;
      if (cur !== prev) { tr++; prev = cur; }
    }
    if (tr >= minTransitions) { run++; if (run > maxRun) maxRun = run; }
    else run = 0;
  }
  return maxRun >= Math.max(8, H * 0.03);
}

/* ───────────────────── MRZ (Tesseract OCR) ───────────────────── */

const work = document.createElement('canvas');
const wctx = work.getContext('2d', { willReadFrequently: true });

// Render a (optionally bottom-cropped) grayscale canvas for OCR. Higher targetW = legible MRZ.
// Tesseract does its own binarization, so we only grayscale here.
function ocrCanvas(source, sw, sh, targetW, region) {
  let cropY = 0, cropH = sh;
  if (region === 'bottom') { cropY = Math.floor(sh * 0.42); cropH = sh - cropY; }
  const w = Math.min(targetW, Math.round(sw * 2));   // allow up to 2× upscale for tiny docs
  const scale = w / sw;
  const h = Math.round(cropH * scale);
  work.width = w; work.height = h;
  wctx.drawImage(source, 0, cropY, sw, cropH, 0, 0, w, h);
  const id = wctx.getImageData(0, 0, w, h);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const g = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
    d[i] = d[i + 1] = d[i + 2] = g;
  }
  wctx.putImageData(id, 0, 0);
  return work;
}

function captureFrame() {
  if (!video.videoWidth) return null;
  return ocrCanvas(video, video.videoWidth, video.videoHeight, 1100, 'full');
}

async function initOCR() {
  statusEl.textContent = 'Loading MRZ engine…';
  ocrWorker = await Tesseract.createWorker('eng');
  await ocrWorker.setParameters({
    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<',
    tessedit_pageseg_mode: '6',   // uniform block of text
    load_system_dawg: '0',        // MRZ isn't dictionary words — stop Tesseract "correcting" it
    load_freq_dawg: '0'
  });
  statusEl.textContent = 'Ready. Point at the document.';
}

function ensureOCR() {                  // initialize the engine only once
  if (!ocrInitPromise) ocrInitPromise = initOCR();
  return ocrInitPromise;
}

// MRZ detection for an uploaded image: OCR at higher resolution, full frame then bottom crop.
async function detectMRZ(source, sw, sh) {
  await ensureOCR();
  const targetW = Math.min(1700, Math.round(sw * 1.5));
  for (const region of ['full', 'bottom']) {
    try {
      const { data } = await ocrWorker.recognize(ocrCanvas(source, sw, sh, targetW, region));
      console.log('[MRZ OCR · ' + region + ']\n' + data.text);   // helps tuning if it ever misses
      if (looksLikeMRZ(data.text)) return true;
    } catch (e) { /* ignore */ }
  }
  return false;
}

async function ocrTick() {
  if (mode !== 'live' || !ocrWorker || ocrBusy) return;
  // The barcode has priority: if we just saw one, don't waste OCR.
  if (performance.now() - lastBarcodeAt < 1200) return;
  const canvas = captureFrame();
  if (!canvas) return;
  ocrBusy = true;
  try {
    const { data } = await ocrWorker.recognize(canvas);
    if (looksLikeMRZ(data.text) && performance.now() - lastBarcodeAt > 1000) {
      setResult('mrz', 'MRZ', 'Machine-readable zone detected');
    }
  } catch (e) { /* ignore occasional OCR failures */ }
  ocrBusy = false;
}
setInterval(ocrTick, 700);

/* ───────────────────── Camera / startup ───────────────────── */

async function listCameras(preferredId) {
  const devices = await navigator.mediaDevices.enumerateDevices();
  const cams = devices.filter(d => d.kind === 'videoinput');
  cameraSelect.innerHTML = '';
  cams.forEach((c, i) => {
    const opt = document.createElement('option');
    opt.value = c.deviceId;
    opt.textContent = c.label || ('Camera ' + (i + 1));
    cameraSelect.appendChild(opt);
  });
  if (preferredId) cameraSelect.value = preferredId;
}

async function main() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showFatal('This browser does not support camera access.');
    return;
  }
  const localhost = ['localhost', '127.0.0.1'].includes(location.hostname);
  if (!window.isSecureContext && !localhost) {
    showFatal('The camera needs https or localhost. Don\'t open the file by double-clicking (file://); serve it with a local server. See the README.');
    return;
  }
  try {
    // 1) Permission + rear camera by default (on mobile).
    const tmp = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
    const preferred = tmp.getVideoTracks()[0].getSettings().deviceId;
    tmp.getTracks().forEach(t => t.stop());
    await listCameras(preferred);
    // 2) Start the barcode scanner + MRZ OCR.
    await startScanner(cameraSelect.value || preferred);
    ensureOCR();
    statusEl.textContent = 'Looking for a barcode or MRZ…';
  } catch (e) {
    showFatal('Could not access the camera: ' + (e && e.message ? e.message : e));
  }
}

/* ───────────────────── Uploaded image ───────────────────── */

async function processImage(file) {
  mode = 'image';
  startScreen.style.display = 'none';
  if (codeReader) { try { codeReader.reset(); } catch (e) {} }   // pause the live camera
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = async () => {
    photo.src = url;
    photo.style.display = 'block';
    video.style.display = 'none';
    document.getElementById('guide').style.display = 'none';
    const W = img.naturalWidth, H = img.naturalHeight;
    const done = () => { statusEl.textContent = 'Image analyzed · tap ↻ to go back to the camera.'; };
    setResult('scanning', 'Analyzing…', '');

    // 1) Barcode decode (native → ZXing → preprocessed variants)
    statusEl.textContent = 'Looking for a barcode…';
    const text = await decodeBarcode(img, W, H);
    if (text) { handleBarcode(text); done(); return; }

    // 2) MRZ
    statusEl.textContent = 'Looking for MRZ…';
    if (await detectMRZ(img, W, H)) { setResult('mrz', 'MRZ', 'Machine-readable zone detected'); done(); return; }

    // 3) A barcode is clearly present but couldn't be decoded, and there's no MRZ → likely Colombia
    if (detectBarcodeBand(img, W, H)) {
      setResult('colombia', 'BARCODE · Colombia?',
                'PDF417 detected but not decoded — likely a Colombian ID card');
      done(); return;
    }

    setResult('notfound', 'Not detected', 'No barcode or MRZ found in the image');
    done();
  };
  img.onerror = () => showFatal('Could not load the image.');
  img.src = url;
}

async function backToLive() {
  mode = 'live';
  photo.style.display = 'none';
  if (photo.src) { URL.revokeObjectURL(photo.src); photo.removeAttribute('src'); }
  video.style.display = 'block';
  document.getElementById('guide').style.display = 'block';
  setResult('scanning', 'Point at the document…', '');
  statusEl.textContent = 'Looking for a barcode or MRZ…';
  try { await startScanner(cameraSelect.value); }
  catch (e) { showFatal('Could not open the camera: ' + (e && e.message ? e.message : e)); }
}

/* ───────────────────── Events ───────────────────── */

startBtn.addEventListener('click', () => { startScreen.style.display = 'none'; main(); });
cameraSelect.addEventListener('change', () => { if (mode === 'live') startScanner(cameraSelect.value); });
restartBtn.addEventListener('click', () => backToLive());
fileInput.addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (file) processImage(file);
  e.target.value = '';   // allow re-uploading the same file
});
</script>
</body>
</html>
